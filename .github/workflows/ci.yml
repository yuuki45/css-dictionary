name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係インストール
        run: npm ci

      - name: データ整合性検証
        run: npm run validate

      - name: 型チェック
        run: npx tsc --noEmit

      - name: ビルド（静的エクスポート）
        run: npm run build
        env:
          NODE_ENV: production
